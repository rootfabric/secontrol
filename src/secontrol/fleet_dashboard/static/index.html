<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE Fleet Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9875;</text></svg>">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="sidebar">
        <div id="fleet-header">
            <h2>SE Fleet</h2>
            <div id="fleet-stats"></div>
        </div>
        <input id="grid-search" type="text" placeholder="Поиск гридов..." />
        <div id="grid-list"></div>
        <div id="status">Загрузка...</div>
    </div>
    <div id="divider"></div>
    <div id="main">
        <div id="toolbar">
            <span id="grid-title">Выберите грид или нажмите [Fleet] для обзора</span>
            <div id="toolbar-actions">
                <button id="btn-fleet-view" class="toolbar-btn active" title="Обзор флота">Fleet</button>
                <span id="zoom-level">Orbit: ЛКМ | Pan: ПКМ | Zoom: колесо</span>
            </div>
        </div>
        <div id="viewport"></div>
        <div id="right-panel" class="hidden">
            <div id="panel-header">
                <button id="panel-close" title="Закрыть">&times;</button>
                <div id="panel-title"></div>
            </div>
            <div id="panel-body">
                <div id="panel-grid-info"></div>
                <div id="panel-actions"></div>
                <div id="panel-health"></div>
                <div id="panel-devices-header">
                    <span>Устройства</span>
                    <span id="device-count"></span>
                </div>
                <div id="panel-devices"></div>
            </div>
        </div>
    </div>
    <div id="device-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-row">
                    <span id="modal-device-icon" class="modal-device-icon"></span>
                    <div>
                        <div id="modal-device-name" class="modal-device-name"></div>
                        <div id="modal-device-type" class="modal-device-type"></div>
                    </div>
                </div>
                <button id="modal-close" class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>
    <div id="containers-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content" style="width:620px">
            <div class="modal-header">
                <div class="modal-title-row">
                    <span class="modal-device-icon" style="background:rgba(139,233,253,0.12);color:#8be9fd;border:1px solid rgba(139,233,253,0.25)">&#128230;</span>
                    <div>
                        <div class="modal-device-name">Контейнеры</div>
                        <div id="containers-grid-name" class="modal-device-type"></div>
                    </div>
                </div>
                <button id="containers-close" class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="containers-body"></div>
        </div>
    </div>
    <div id="voxel-scan-menu" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content" style="width:360px">
            <div class="modal-header">
                <div class="modal-title-row">
                    <span class="modal-device-icon" style="background:rgba(189,147,249,0.12);color:#bd93f9;border:1px solid rgba(189,147,249,0.25)">&#128225;</span>
                    <div>
                        <div class="modal-device-name">Voxel Scan</div>
                        <div id="voxel-scan-grid-name" class="modal-device-type"></div>
                    </div>
                </div>
                <button id="voxel-scan-close" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <div class="modal-section-title purple">Параметры скана</div>
                    <div class="modal-props" style="grid-template-columns:1fr">
                        <div class="modal-prop">
                            <span class="modal-prop-label">Radius (м)</span>
                            <input id="voxel-radius" type="number" value="5000" min="50" max="10000" step="50" style="background:var(--bg-dark);border:1px solid var(--border);color:var(--text-primary);padding:5px 8px;border-radius:4px;font-family:inherit;font-size:12px;width:100%">
                        </div>
                        <div class="modal-prop">
                            <span class="modal-prop-label">Cell Size (м)</span>
                            <input id="voxel-cellsize" type="number" value="50" min="1" max="100" step="1" style="background:var(--bg-dark);border:1px solid var(--border);color:var(--text-primary);padding:5px 8px;border-radius:4px;font-family:inherit;font-size:12px;width:100%">
                        </div>
                        <div class="modal-prop" style="flex-direction:row;align-items:center;gap:8px">
                            <input id="voxel-oreonly" type="checkbox" style="accent-color:#bd93f9;width:14px;height:14px">
                            <span class="modal-prop-label" style="margin:0">Ore Only</span>
                        </div>
                    </div>
                </div>
                <div id="voxel-scan-progress-section" class="modal-section" style="display:none">
                    <div class="modal-section-title yellow">Прогресс</div>
                    <div id="voxel-scan-status" style="font-size:11px;color:var(--text-secondary);margin-bottom:4px"></div>
                    <div class="health-bar-container">
                        <div id="voxel-scan-fill" class="health-bar-fill" style="width:0%;background:#bd93f9"></div>
                    </div>
                </div>
                <div class="modal-section">
                    <div class="modal-actions">
                        <button id="voxel-scan-start" class="action-btn" style="border-color:#bd93f9;color:#bd93f9;font-weight:600">Scan</button>
                        <button id="voxel-scan-cancel" class="action-btn danger" style="display:none">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="ore-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content" style="width:480px">
            <div class="modal-header">
                <div class="modal-title-row">
                    <span class="modal-device-icon" style="background:rgba(255,184,108,0.12);color:#ffb86c;border:1px solid rgba(255,184,108,0.25)">&#9937;</span>
                    <div>
                        <div class="modal-device-name">Руды</div>
                        <div id="ore-grid-name" class="modal-device-type"></div>
                    </div>
                </div>
                <button id="ore-close" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <div class="modal-section-title purple">Ближайшие руды</div>
                    <div id="ore-list" style="font-size:11px;color:var(--text-secondary)">Загрузка...</div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title yellow">Сканирование</div>
                    <div class="modal-props" style="grid-template-columns:1fr">
                        <div class="modal-prop">
                            <span class="modal-prop-label">Radius (м)</span>
                            <input id="ore-radius" type="number" value="300" min="50" max="5000" step="50" style="background:var(--bg-dark);border:1px solid var(--border);color:var(--text-primary);padding:5px 8px;border-radius:4px;font-family:inherit;font-size:12px;width:100%">
                        </div>
                        <div class="modal-prop">
                            <span class="modal-prop-label">Cell Size (м)</span>
                            <input id="ore-cellsize" type="number" value="10" min="1" max="50" step="1" style="background:var(--bg-dark);border:1px solid var(--border);color:var(--text-primary);padding:5px 8px;border-radius:4px;font-family:inherit;font-size:12px;width:100%">
                        </div>
                    </div>
                </div>
                <div id="ore-scan-progress-section" class="modal-section" style="display:none">
                    <div class="modal-section-title yellow">Прогресс</div>
                    <div id="ore-scan-status" style="font-size:11px;color:var(--text-secondary);margin-bottom:4px"></div>
                    <div class="health-bar-container">
                        <div id="ore-scan-fill" class="health-bar-fill" style="width:0%;background:#ffb86c"></div>
                    </div>
                </div>
                <div class="modal-section">
                    <div class="modal-actions">
                        <button id="ore-scan-start" class="action-btn" style="border-color:#ffb86c;color:#ffb86c;font-weight:600">Scan Ores</button>
                        <button id="ore-scan-cancel" class="action-btn danger" style="display:none">Cancel</button>
                        <button id="ore-refresh" class="action-btn" style="border-color:#8be9fd;color:#8be9fd">Обновить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="/static/app.js"></script>
</body>
</html>
